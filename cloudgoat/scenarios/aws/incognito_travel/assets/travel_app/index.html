<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incognito Travel | Explore the Unknown</title>
    <style>
        :root {
            --primary: #2d3436;
            --accent: #0984e3;
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #2d3436;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        nav {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
        }
        .container {
            width: 90%;
            max-width: 600px;
            margin-top: 50px;
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { margin-top: 0; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #0773c5; }
        #message { margin-top: 1rem; color: #d63031; text-align: center; }
        .dashboard { display: none; }
        .trip-card {
            background: #f1f2f6;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 5px solid var(--accent);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <nav>
        <span>Incognito Travel</span>
        <span id="user-display"></span>
    </nav>

    <div class="container" id="auth-panel">
        <h1 id="title">Login</h1>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="explorer@hacksmarter.hsm">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="action-btn" onclick="handleAuth()">Login</button>
        <p style="text-align: center;">
            <a href="#" onclick="toggleAuth()" id="toggle-link">Need an account? Register</a>
        </p>
        <div id="message"></div>
    </div>

    <div class="container dashboard" id="dashboard-panel">
        <h1>Welcome, <span id="profile-name">Explorer</span>!</h1>
        <p>Your current active missions:</p>
        <div id="trips-list">
            <p>You have no active trips. Book your next adventure now!</p>
        </div>
        <button onclick="logout()" style="margin-top: 20px; background: #636e72;">Logout</button>
    </div>

    <script>
        // Cognito Configuration - discovered in JS
        const COGNITO_CONFIG = {
            userPoolId: '${pool_id}',
            clientId: '${client_id}'
        };

        // API Endpoint - injected by Terraform
        const API_URL = '${api_url}'; 
        let isLogin = true;

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('action-btn').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('toggle-link').innerText = isLogin ? 'Need an account? Register' : 'Have an account? Login';
            document.getElementById('message').innerText = '';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');

            if (isLogin) {
                // Perform Login (Enumeration Demo)
                try {
                    const res = await fetch(`${API_URL}/login`, {
                        method: 'POST',
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    msg.innerText = data.message;
                } catch (e) {
                    msg.innerText = "Error connecting to server.";
                }
            } else {
                // Perform Registration (Mock)
                msg.style.color = '#00b894';
                msg.innerText = "Registration successful! (Demo mode: Use your own Cognito session to login)";
            }
        }

        async function loadProfile(token) {
            try {
                const res = await fetch(`${API_URL}/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.profile) {
                    document.getElementById('auth-panel').style.display = 'none';
                    document.getElementById('dashboard-panel').style.display = 'block';
                    document.getElementById('profile-name').innerText = data.profile.name;
                    
                    const tripsList = document.getElementById('trips-list');
                    if (data.profile.trips.length > 0) {
                        tripsList.innerHTML = data.profile.trips.map(t => `
                            <div class="trip-card">
                                <strong>${t}</strong>
                            </div>
                        `).join('');
                    }
                }
            } catch (e) {
                console.error("Profile load failed", e);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        // Check for token on load
        window.onload = () => {
            const token = localStorage.getItem('token');
            if (token) loadProfile(token);
        };
    </script>
</body>
</html>
